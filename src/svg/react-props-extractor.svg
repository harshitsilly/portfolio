<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- React blue gradient -->
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#21a1c4;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glassBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgDark)"/>

  <!-- Ambient glow -->
  <circle cx="400" cy="280" r="180" fill="#61dafb" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Central React component - glass card -->
  <g transform="translate(400, 280)" filter="url(#glassBlur)">
    <rect x="-120" y="-120" width="240" height="240" rx="28" fill="rgba(97, 218, 251, 0.08)" stroke="rgba(97, 218, 251, 0.3)" stroke-width="2"/>
    <rect x="-110" y="-110" width="220" height="220" rx="20" fill="none" stroke="rgba(97, 218, 251, 0.12)" stroke-width="1"/>
    <!-- Top edge highlight -->
    <rect x="-120" y="-120" width="240" height="3" rx="1.5" fill="rgba(97, 218, 251, 0.5)"/>

    <!-- React atom logo -->
    <g>
      <ellipse cx="0" cy="-45" rx="28" ry="18" fill="none" stroke="url(#reactGrad)" stroke-width="4.5" opacity="0.85"/>
      <ellipse cx="0" cy="45" rx="28" ry="18" fill="none" stroke="url(#reactGrad)" stroke-width="4.5" opacity="0.85"/>
      <ellipse cx="-50" cy="0" rx="18" ry="28" fill="none" stroke="url(#reactGrad)" stroke-width="4.5" opacity="0.85"/>
      <ellipse cx="50" cy="0" rx="18" ry="28" fill="none" stroke="url(#reactGrad)" stroke-width="4.5" opacity="0.85"/>
      <circle cx="0" cy="0" r="12" fill="url(#reactGrad)" opacity="0.95"/>
    </g>
  </g>

  <!-- Extraction arrows -->
  <g stroke="#61dafb" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#glassBlur)">
    <!-- Top arrow -->
    <path d="M400 80 L400 130"/>
    <polygon points="400,130 395,140 405,140" fill="#61dafb" opacity="0.6"/>

    <!-- Bottom arrow -->
    <path d="M400 430 L400 480"/>
    <polygon points="400,480 395,470 405,470" fill="#61dafb" opacity="0.6"/>

    <!-- Left arrow -->
    <path d="M230 280 L290 280"/>
    <polygon points="290,280 280,275 280,285" fill="#61dafb" opacity="0.6"/>

    <!-- Right arrow -->
    <path d="M570 280 L510 280"/>
    <polygon points="510,280 520,275 520,285" fill="#61dafb" opacity="0.6"/>
  </g>

  <!-- Output type cards - glass style -->
  <g filter="url(#glassBlur)">
    <!-- Left output card -->
    <rect x="120" y="480" width="180" height="70" rx="16" fill="rgba(33, 161, 196, 0.1)" stroke="rgba(33, 161, 196, 0.25)" stroke-width="1.5"/>
    <rect x="128" y="488" width="164" height="54" rx="10" fill="none" stroke="rgba(33, 161, 196, 0.15)" stroke-width="1"/>
    <text x="210" y="515" font-family="'JetBrains Mono', monospace" font-size="13" fill="#61dafb" text-anchor="middle" opacity="0.9">interface</text>
    <text x="210" y="532" font-family="'JetBrains Mono', monospace" font-size="12" fill="rgba(97, 218, 251, 0.7)" text-anchor="middle">Props {...}</text>
  </g>

  <g filter="url(#glassBlur)">
    <!-- Right output card -->
    <rect x="500" y="480" width="180" height="70" rx="16" fill="rgba(33, 161, 196, 0.1)" stroke="rgba(33, 161, 196, 0.25)" stroke-width="1.5"/>
    <rect x="508" y="488" width="164" height="54" rx="10" fill="none" stroke="rgba(33, 161, 196, 0.15)" stroke-width="1"/>
    <text x="590" y="515" font-family="'JetBrains Mono', monospace" font-size="13" fill="#61dafb" text-anchor="middle" opacity="0.9">type Props</text>
    <text x="590" y="532" font-family="'JetBrains Mono', monospace" font-size="12" fill="rgba(97, 218, 251, 0.7)" text-anchor="middle">= {...}</text>
  </g>

  <!-- Decorative code snippets in background -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#61dafb" opacity="0.12">
    <text x="60" y="100">interface ComponentProps {</text>
    <text x="80" y="118">  title: string;</text>
    <text x="80" y="136">  onClick: () => void;</text>
    <text x="60" y="154">}</text>

    <text x="520" y="100">type Props = {</text>
    <text x="540" y="118">  title: string;</text>
    <text x="540" y="136">  onClick: () => void;</text>
    <text x="520" y="154">};</text>
  </g>

  <!-- Title -->
  <text x="400" y="570" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="600" fill="white" text-anchor="middle" opacity="0.95">
    react-props-type-extractor
  </text>
  <text x="400" y="598" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="0.5">
    Extract prop types at build time
  </text>
</svg>